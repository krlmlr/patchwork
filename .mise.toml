[env]
_.path = ["{{config_root}}/build/cpp"]

[tasks.setup]
description = "Configure the build directory"
run = "meson setup build"

[tasks.build]
description = "Build the project"
run = "ninja -C build"

[tasks.test]
description = "Run tests"
run = "meson test -C build"

[tasks.codegen]
description = "Regenerate committed C++ headers from data files"
run = "Rscript codegen/generate_patches.R"

[tasks."codegen:setups"]
description = "Generate canonical game setups in cpp/generated/game_setups.hpp"
run = "Rscript codegen/generate_setups.R"

[tasks.format]
description = "Format C++ source files with clang-format"
run = "find cpp \\( -name '*.cpp' -o -name '*.hpp' \\) -print0 | xargs -0 clang-format -i"

[tasks.lint]
description = "Lint Markdown files with markdownlint-cli2"
run = "markdownlint-cli2 '**/*.md'"
